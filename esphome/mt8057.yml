esphome:
  name: mt8057

esp8266:
  board: d1_mini

mqtt:
  broker: "ha.local"

# Enable logging
logger:
#  baud_rate: 0 # disable uart

# Enable Home Assistant API
#api:
#  password: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: high
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Mt8057 Fallback Hotspot"
    password: "bVnd5ISdeSdq"

captive_portal:

sensor:
  - platform: zyaura
    clock_pin: D1
    data_pin: D2
    co2:
      name: "CO2"
    temperature:
      name: "Temp"

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
