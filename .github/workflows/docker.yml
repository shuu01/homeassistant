name: Build Docker images

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "whisper/**"
      - "kokoro/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      whisper: ${{ steps.filter.outputs.whisper }}
      kokoro: ${{ steps.filter.outputs.kokoro }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            whisper:
              - 'whisper/**'
            kokoro:
              - 'kokoro/**'

  whisper:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.whisper == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./whisper/Dockerfile
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/whisper:latest

  kokoro:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.kokoro == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./kokoro/Dockerfile
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/kokoro:latest
